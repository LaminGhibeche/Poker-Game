<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق بوكر تكساس المصغر أونلاين</title>
    <!-- استدعاء مكتبة Socket.io للاتصال الفوري -->
    <script src="https://socket.io"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background: #252525;
            height: 100vh;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header-bar {
            background: #111;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
        }
        .wallet-info {
            background: #222;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #00ffcc;
            font-size: 14px;
            color: #00ffcc;
            font-weight: bold;
        }
        .game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }
        .poker-table {
            width: 95%;
            height: 240px;
            background: radial-gradient(circle, #1b7332 60%, #114b20 100%);
            border: 12px solid #5a3d28;
            border-radius: 120px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 10px 20px rgba(0,0,0,0.4);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .community-cards {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .card {
            width: 45px;
            height: 68px;
            background: #fff;
            color: #000;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card.red { color: #e53935; }
        .card.hidden-card {
            background: linear-gradient(135deg, #cc0000 25%, #990000 100%);
            border: 2px solid #fff;
            color: transparent;
        }
        .seat {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid #555;
        }
        .seat-top-left  { top: -25px; left: 15%; }
        .seat-top-right { top: -25px; right: 15%; }
        .seat-left      { top: 40%; left: -30px; }
        .seat-right     { top: 40%; right: -30px; }
        
        .player-main-area {
            background: #1e1e1e;
            padding: 15px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 3px solid #333;
        }
        .player-info {
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffcc00;
        }
        .my-cards {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        .my-cards .card {
            width: 60px;
            height: 90px;
            font-size: 22px;
        }
        .action-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            color: white;
        }
        .btn-fold { background: #d32f2f; }
        .btn-call { background: #1976d2; }
        .btn-raise { background: #388e3c; }
        .btn-deal { background: #ff9800; color: #000; }
        .status-text {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <div>♠️ بوكر تكساس أونلاين</div>
        <div class="wallet-info" id="wallet-balance">رصيدك: 1000 Chips</div>
    </div>

    <div class="game-area">
        <div class="poker-table">
            <!-- أوراق الطاولة المجتمعية -->
            <div class="community-cards" id="community-area"></div>
        </div>
    </div>

    <div class="player-main-area">
        <div class="player-info" id="player-status">جاري الاتصال بالطاولة المشتركة...</div>
        <div class="my-cards" id="my-cards-area"></div>
        <div class="action-buttons">
            <button class="btn btn-fold" onclick="sendAction('Fold')">انسحاب Fold</button>
            <button class="btn btn-call" onclick="sendAction('Call')">مجاراة Call</button>
            <button class="btn btn-raise" onclick="sendAction('Raise')">زيادة Raise</button>
            <button class="btn btn-deal" onclick="requestNewRound()">بدء الجولة 🔄</button>
        </div>
        <div class="status-text" id="connection-log">سيرفر أونلاين غير متصل</div>
    </div>
</div>

<script>
    // ربط الواجهة بالسيرفر الخاص بك على Render مباشرة
    const SERVER_URL = "wss://://onrender.com";
    const socket = io(SERVER_URL);

    const suitsRed = ['♥', '♦'];
    const roomId = "main_table_1"; // اسم الطاولة الموحدة لجميع اللاعبين أونلاين
    const playerName = "لاعب " + Math.floor(Math.random() * 1000);

    // عند نجاح الاتصال الفوري بالسيرفر السحابي
    socket.on('connect', () => {
        document.getElementById('connection-log').innerText = "متصل بالسيرفر الأونلاين الحقيقي بنجاح ✅";
        document.getElementById('connection-log').style.color = "#00ffcc";
        
        // الانضمام التلقائي للطاولة المشتركة
        socket.emit('joinRoom', { roomId, playerName });
    });

    // استقبال تحديثات الطاولة من السيرفر عند دخول لاعبين آخرين
    socket.on('roomUpdate', (room) => {
        document.getElementById('player-status').innerText = `أنت متصل بصفتك: ${playerName} | عدد اللاعبين بالطاولة: ${room.players.length}`;
    });

    // استقبال أوراقك السرية الخاصة بك فقط من السيرفر لمنع الغش والكشف
    socket.on('yourCards', (cards) => {
        const myCardsArea = document.getElementById('my-cards-area');
        myCardsArea.innerHTML = cards.map(card => `
            <div class="card ${suitsRed.includes(card.suit) ? 'red' : ''}">
                <div>${card.value}</div>
                <div>${card.suit}</div>
            </div>
        `).join('');
    });

    // استقبال أوراق الطاولة المجتمعية العامة لجميع اللاعبين في نفس الوقت
    socket.on('roundStarted', (data) => {
        const communityArea = document.getElementById('community-area');
        communityArea.innerHTML = data.communityCards.map(card => `
            <div class="card ${suitsRed.includes(card.suit) ? 'red' : ''}">
                <div>${card.value}</div>
                <div>${card.suit}</div>
            </div>
        `).join('');
    });

    // بث حركات اللاعبين أونلاين لجميع الهواتف المتصلة
    socket.on('actionBroadcast', (data) => {
        alert(`قام أحد اللاعبين بحركة: ${data.action}`);
    });

    // طلب بدء جولة جديدة وتوزيع الورق من السيرفر
    function requestNewRound() {
        socket.emit('startRound', roomId);
    }

    // إرسال حركة الرهان الخاصة بك للسيرفر لتبث لجميع اللاعبين
    function sendAction(actionType) {
        socket.emit('playerAction', { roomId, action: actionType, amount: 50 });
    }
</script>

</body>
</html>
